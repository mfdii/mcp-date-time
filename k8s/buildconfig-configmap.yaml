---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mcp-date-time
  namespace: n8n
spec:
  output:
    to:
      kind: ImageStreamTag
      name: mcp-date-time:latest
  source:
    type: Dockerfile
    dockerfile: |
      FROM node:20-alpine
      WORKDIR /app
      RUN npm install --global tsx && \
          npm install @modelcontextprotocol/sdk@^1.0.4 express@^4.21.2 && \
          npm cache clean --force
      COPY server.ts /app/server.ts
      RUN chown -R 1001:0 /app && chmod -R g=u /app
      USER 1001
      EXPOSE 8080
      ENV PORT=8080 NODE_ENV=production
      CMD ["tsx", "/app/server.ts"]
    configMaps:
      - configMap:
          name: mcp-date-time-server
        destinationDir: "."
  strategy:
    type: Docker
  triggers:
  - type: ConfigChange
